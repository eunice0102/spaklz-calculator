<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <style>
        body {
            background:
                linear-gradient(115deg, rgba(236, 72, 153, 0.18) 0 18%, transparent 18% 100%),
                linear-gradient(155deg, rgba(34, 211, 238, 0.2) 0 22%, transparent 22% 100%),
                linear-gradient(135deg, #111827 0%, #1f2937 42%, #f8fafc 42%, #eef2ff 100%);
            min-height: 100vh;
        }

        .img-preview {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 8px;
            cursor: zoom-in;
        }

        .tweet-trigger {
            width: 96px;
            height: 96px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: linear-gradient(135deg, #0f172a, #155e75);
            color: white;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.16);
            cursor: zoom-in;
        }

        .tweet-trigger span {
            font-size: 15px;
            font-weight: 800;
        }

        .tweet-trigger small {
            font-size: 11px;
            color: #bae6fd;
        }

        .tweet-embed-shell {
            max-height: 84vh;
            overflow: auto;
            border-radius: 12px;
            background: white;
            padding: 8px;
        }

        @media (max-width: 768px) {
            thead { display: none; }
            #item-list tr {
                display: flex;
                flex-direction: column;
                padding: 1.5rem 1rem;
                border-bottom: 2px solid #f1f5f9;
                background: white;
                margin-bottom: 0.5rem;
            }
            #item-list td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0 !important;
                border: none !important;
                width: 100%;
            }
            #item-list td:nth-child(1) { justify-content: center; }
            #item-list td:nth-child(2) { font-size: 1.1rem; justify-content: center; text-align: center; color: #0f172a; }
            #item-list td:nth-child(4) { justify-content: center; color: #64748b; font-size: 0.875rem; margin-bottom: 0.5rem; }
            #item-list td:nth-child(5)::before { content: "價格"; font-weight: bold; color: #94a3b8; }
            #item-list td:nth-child(6)::before { content: "數量"; font-weight: bold; color: #94a3b8; }
            #item-list td:nth-child(3) { display: none !important; }
            .qty-input { width: 100px !important; height: 44px; }
        }
    </style>
</head>

        { img: 'images/14.png', name: '뽀시래기 미니 키링 B（娃娃迷你吊飾 B）', types: 14, note: '受', price: 7500 },
        { img: 'images/15.png', name: '뽀시래기 컬렉션 미니 스탠드 A（娃娃收藏迷你立牌 A）', types: 14, note: '攻', price: 4200 },
        { img: 'images/15.png', name: '뽀시래기 컬렉션 미니 스탠드 B（娃娃收藏迷你立牌 B）', types: 14, note: '受', price: 4200 },

        { img: 'images/18.png', name: 'PVC 파우치 키링（PVC 收納包鑰匙圈）', types: 1, note: '', price: 15000 },
        { img: 'images/19.png', name: '응원봉 플러시 키링（應援棒絨毛鑰匙圈）', types: 1, note: '', price: 14000 },
        { img: 'images/20.png', name: '뽀시래기 인형 콘서트 티셔츠（娃娃演唱會 T-shirt）', types: 1, note: '', price: 9000 },
        { img: 'images/21.png', name: '뽀시래기 의상팩 A（娃娃服裝包 A）', types: 1, note: '', price: 18000 },
        { img: 'images/22.png', name: '뽀시래기 의상팩 B（娃娃服裝包 B）', types: 1, note: '', price: 18000 },
        { img: 'images/23.png', name: '뽀시래기 의상팩 C（娃娃服裝包 C）', types: 1, note: '', price: 18000 },
        { img: 'images/24.png', name: '뽀시래기 의상팩 D（娃娃服裝包 D）', types: 1, note: '', price: 23000 },
        { img: 'images/25.png', name: 'A3 단체 포스터 A（A3 團體海報 A）', types: 1, note: '攻', price: 15000 },
        { img: 'images/26.png', name: 'A3 단체 포스터 B（A3 團體海報 B）', types: 1, note: '受', price: 15000 },
        { img: 'images/27.png', name: '시즌그리팅（Season\'s Greetings）', types: 1, note: '', price: 60000 },
        { img: 'images/28.png', name: '컬렉션포토（卡包）', types: 13, note: '', price: 5000 }
    ];

    const itemList = document.getElementById('item-list');
    const grandTotalDisplay = document.getElementById('grand-total');
    const exchangeRateInput = document.getElementById('exchange-rate');
    const twdTotalDisplay = document.getElementById('twd-total');
    const imageModal = document.getElementById('image-modal');
    const modalImage = document.getElementById('modal-image');
    const modalTweet = document.getElementById('modal-tweet');
    const modalSourceLink = document.getElementById('modal-source-link');
    const bonus5wDisplay = document.getElementById('bonus-5w');
    const bonus10wDisplay = document.getElementById('bonus-10w');

    function imageCell(item) {

        const tweetAttr = item.tweetUrl ? ` data-tweet-url="${item.tweetUrl}"` : '';
        return `<img src="${item.img}" class="img-preview"${tweetAttr} alt="${item.name}">`;
    }

    function renderRows() {
        itemList.innerHTML = items.map(item => `
            <tr class="transition-colors hover:bg-cyan-50/60">
                <td class="px-4 py-3"><div class="flex h-24 w-24 items-center justify-center overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">${imageCell(item)}</div></td>
                <td class="px-4 py-3 font-semibold text-slate-900">${item.name}</td>
                <td class="px-4 py-3 text-center font-medium text-slate-700">${item.types}</td>
                <td class="px-4 py-3 text-sm text-slate-500">${item.note}</td>
                <td class="px-4 py-3 text-right font-medium text-slate-700">${item.price.toLocaleString()}</td>
                <td class="px-4 py-3 text-center">
                    <div class="inline-flex items-center rounded-lg border border-slate-200 overflow-hidden shadow-sm bg-white">
                        <button type="button" class="minus-btn w-10 h-10 flex items-center justify-center hover:bg-slate-50 transition-colors border-r border-slate-200 text-lg font-bold text-slate-600">-</button>
                        <input type="number" value="0" min="0" data-price="${item.price}" class="qty-input w-12 h-10 text-center font-black outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                        <button type="button" class="plus-btn w-10 h-10 flex items-center justify-center hover:bg-slate-50 transition-colors border-l border-slate-200 text-lg font-bold text-slate-600">+</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function calculate() {
        let total = 0;
        document.querySelectorAll('#item-list tr').forEach(row => {
            const input = row.querySelector('.qty-input');
            if (!input) return;
            const qty = parseInt(input.value) || 0;
            total += qty * parseInt(input.dataset.price);
        });
        grandTotalDisplay.textContent = total.toLocaleString();
        twdTotalDisplay.textContent = Math.round(total * (parseFloat(exchangeRateInput.value) || 0)).toLocaleString();
        bonus5wDisplay.textContent = Math.floor(total / 50000);
        bonus10wDisplay.textContent = Math.floor(total / 100000);
    }

    function showImageModal(src) {
        modalTweet.classList.add('hidden');
        modalTweet.innerHTML = '';
        modalImage.src = src;
        modalImage.classList.remove('hidden');
        modalSourceLink.classList.add('hidden');
        imageModal.classList.replace('hidden', 'flex');
    }

    function showTweetModal(tweetUrl) {
        modalImage.classList.add('hidden');
        modalImage.src = '';
        modalTweet.classList.remove('hidden');
        modalTweet.innerHTML = `<blockquote class="twitter-tweet" data-hide-thread="true" data-conversation="none"><a href="${tweetUrl}"></a></blockquote>`;
        modalSourceLink.href = tweetUrl;
        modalSourceLink.classList.remove('hidden');
        imageModal.classList.replace('hidden', 'flex');

        if (window.twttr?.widgets) {
            window.twttr.widgets.load(modalTweet);
        } else {
            document.querySelector('script[src*="platform.twitter.com/widgets.js"]')?.addEventListener('load', () => {
                window.twttr?.widgets?.load(modalTweet);
            }, { once: true });
        }
    }

    function bindEvents() {
        document.querySelectorAll('#item-list tr').forEach(row => {
            const minusBtn = row.querySelector('.minus-btn');
            const plusBtn = row.querySelector('.plus-btn');
            const input = row.querySelector('.qty-input');
            const preview = row.querySelector('.img-preview');
            const tweetButton = row.querySelector('.tweet-trigger');

            minusBtn.onclick = () => {
                input.value = Math.max(0, (parseInt(input.value) || 0) - 1);
                calculate();
            };
            plusBtn.onclick = () => {
                input.value = (parseInt(input.value) || 0) + 1;
                calculate();
            };
            input.oninput = calculate;

            if (preview) {
                preview.onclick = () => preview.dataset.tweetUrl ? showTweetModal(preview.dataset.tweetUrl) : showImageModal(preview.src);
            }
            if (tweetButton) {
                tweetButton.onclick = () => showTweetModal(tweetButton.dataset.tweetUrl);
            }
        });

        exchangeRateInput.oninput = calculate;
        imageModal.onclick = () => imageModal.classList.replace('flex', 'hidden');
        document.getElementById('close-modal').onclick = () => imageModal.classList.replace('flex', 'hidden');
        modalImage.onclick = event => event.stopPropagation();
        modalTweet.onclick = event => event.stopPropagation();
        modalSourceLink.onclick = event => event.stopPropagation();
    }

    function exportList() {
        const total = grandTotalDisplay.textContent;
        const twdTotal = twdTotalDisplay.textContent;
        const bonus5w = bonus5wDisplay.textContent;
        const bonus10w = bonus10wDisplay.textContent;

        let itemRows = '';
        document.querySelectorAll('#item-list tr').forEach(row => {
            const input = row.querySelector('.qty-input');
            const qty = parseInt(input?.value) || 0;
            if (qty <= 0) return;

            const img = row.querySelector('.img-preview');
            const imgSrc = img ? img.src : '';
            const name = row.querySelector('td:nth-child(2)').innerText;
            const spec = row.querySelector('td:nth-child(4)').innerText;
            const subtotal = (qty * parseInt(input.dataset.price)).toLocaleString();

            itemRows += `
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 12px 0;">${imgSrc ? `<img src="${imgSrc}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;">` : ''}</td>
                <td style="padding: 12px 8px;">
                    <div style="font-weight: bold; color: #1e293b; font-size: 15px; line-height: 1.2;">${name}</div>
                    <div style="font-size: 12px; color: #94a3b8; margin-top: 2px;">${spec}</div>
